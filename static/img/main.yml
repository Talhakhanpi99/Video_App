name: Build Video App APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: video_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate project layout
        shell: bash
        run: |
          test -f "buildozer.spec"
          test -f "main.py"
          test -f "templates/index.html"
          test -f "static/css/style.css"
          test -f "static/js/script.js"
          test -f "config/app_config.json"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0" virtualenv

      - name: Clean previous Android build cache
        run: |
          rm -rf .buildozer bin

      - name: Build APK with Buildozer
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-app-build-log
          path: video_app/buildozer-ci.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-app-apk
          path: video_app/bin/*.apk
