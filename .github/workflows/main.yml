name: Build Video App APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect_project
        shell: bash
        run: |
          if [ -f "video_app/buildozer.spec" ]; then
            PROJECT_DIR="video_app"
          elif [ -f "buildozer.spec" ]; then
            PROJECT_DIR="."
          else
            echo "Could not find buildozer.spec in repo root or video_app/" >&2
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Detected project directory: $PROJECT_DIR"

      - name: Validate project layout
        shell: bash
        run: |
          cd "${{ steps.detect_project.outputs.project_dir }}"
          test -f "buildozer.spec"
          test -f "main.py"
          test -f "templates/index.html"
          test -f "static/css/style.css"
          test -f "static/js/script.js"
          test -f "config/app_config.json"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0" virtualenv

      - name: Clean previous Android build cache
        shell: bash
        run: |
          cd "${{ steps.detect_project.outputs.project_dir }}"
          rm -rf .buildozer bin

      - name: Build APK with Buildozer
        shell: bash
        run: |
          cd "${{ steps.detect_project.outputs.project_dir }}"
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-app-build-log
          path: ${{ steps.detect_project.outputs.project_dir }}/buildozer-ci.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-app-apk
          path: ${{ steps.detect_project.outputs.project_dir }}/bin/*.apk
